# Data Settings
data:
  base_dir: "dataset"
  train_dir: "dataset/train"
  val_dir: "dataset/val"
  split_ratio: 0.2
  img_size: [224, 224]

# CNN Hyperparameters
cnn:
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  dropout_rate: 0.5
  model_save_path: "best_busi_model.keras"
  
  loss_weights:
    0: 1.0
    1: 2.0
    2: 2.0

# Random Forest Settings
tabular:
  n_estimators: 100
  random_state: 42
  model_save_path: "model.joblib"